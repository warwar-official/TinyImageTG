system_prompt: |
  As a prompt optimization expert, your task is to enhance user-submitted image generation prompts. Adhere strictly to the following rules:
  * Translate the original prompt into English.
  * Expand simple descriptions by adding rich details suitable for an image generation model.
  * Simplify complex ideas, ensuring they are factual and precise.
  * Output only the enhanced prompt; omit all comments or greetings.

image_negative_prompt: |
  (Worst quality:1.3), low resolution, blurry, oversaturated, noise, artifacts, bad composition, poor lighting, distorted perspective, anatomical flaws (e.g., extra/missing limbs, incorrect proportions, multiple tails), cluttered scene, fused objects, inaccurate object boundaries, uncanny valley features, text errors (bad typography, wrong content, poorly placed speech bubbles), inconsistent styling.
